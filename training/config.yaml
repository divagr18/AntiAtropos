# AntiAtropos QLoRA Training Configuration
# ============================================================
# Target GPU: NVIDIA A10G (24 GiB VRAM)
#
# Sequence length rationale:
#   System prompt ~ 500 tokens
#   Observation (5 nodes) ~ 150 tokens
#   Reasoning + JSON action ~ 40 tokens
#   Chat template overhead ~ 50 tokens
#   Total per turn ~ 740 tokens
#   1024 gives 38% headroom — plenty. Going shorter saves VRAM for
#   more episodes per iteration (the real bottleneck is env API latency).
#
# All values can be overridden via environment variables:
#   e.g. ANTIATROPOS_LR=5e-5 python training/train.py

# ---- Run Identity ----
run_id: "run_001"                    # Unique run identifier — change per run (used for checkpoint subfolder)

# ---- Environment (OpenEnv) ----
env_url: "https://pranavkk-antiatropos.hf.space"
tasks: ["task-1", "task-2", "task-3"]
max_steps_per_episode: 20            # 20 steps: task-2 failure can occur mid-ep; need recovery steps
env_mode: "simulated"                # "simulated" | "live" | "hybrid" — set to "live" for real k8s

# ---- Model ----
base_model: "Qwen/Qwen3.5-4B"
max_seq_length: 512                  # 40% smaller observation + shorter prompt = ~350 tokens peak
load_in_4bit: true

# ---- LoRA ----
lora_rank: 64                        # rank-64: +83 MiB vs rank-32 (negligible), meaningfully more expressiveness
lora_alpha: 64                       # Keep alpha == rank (standard; scales effective LR of LoRA)
lora_dropout: 0.0
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ---- Training (reward-based) ----
loss_type: "reinforce_baseline"       # reinforce | reinforce_baseline | grpo
# VRAM budget (A10G 22.3 GiB):
#   Base model (4-bit):      ~3.3 GiB
#   One forward pass (bf16): ~8.9 GiB activations  (seq=512, batch=1)
#   loss_batch_size=2:       ~17-18 GiB peak  →  fits within 22.3 GiB with 4-5 GiB headroom
#   loss_batch_size=3:       ~26 GiB          →  OOM
num_episodes_per_iteration: 6         # 6 = 2×tasks. CRITICAL: must be multiple of 3 for balanced curriculum
                                      # With 4 eps: task-1 gets 2× gradient signal (ep_idx % 3 → [0,1,2,0])
num_iterations: 15                    # timing: 6ep × 20steps × ~5s/step-batch ≈ 5 min/iter → 15 iters ≈ 1.25hr
parallel_episodes: true               # Batch generation across episodes (single GPU forward per step)
loss_batch_size: 1                    # A10G: batch=1 proven safe (peak ~9 GiB). Retry 2 after validating new entropy path.
learning_rate: 1.0e-5
per_device_train_batch_size: 2        # A10G can handle 2 with seq_len=1024
gradient_accumulation_steps: 4        # Effective batch = 2*4 = 8 transitions
warmup_steps: 50
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
optim: "adamw_8bit"

# ---- GRPO / RLOO specific ----
grpo_k: 4                            # Group size for GRPO (samples per state)
rloo_k: 2                            # Leave-one-out group size

# ---- Reward shaping ----
reward_gamma: 0.99                    # Discount factor for returns
reward_gae_lambda: 0.95              # GAE lambda (if using GAE)
advantage_normalize: true             # Normalize advantages across batch
entropy_coef: 0.001                   # Per-token avg entropy bonus (reduced from 0.005 — high entropy coef fights REINFORCE signal and pushes policy toward random actions)

# ---- Generation ----
generation_max_new_tokens: 50         # JSON action is ~30 tokens; 50 is safe cap
generation_temperature: 0.85          # 0.85: more exploration diversity (matches openenv_loop.py default)
generation_top_p: 0.9
generation_do_sample: true

# ---- Evaluation ----
eval_interval: 50                     # Evaluate every N iterations
eval_episodes: 3                      # Episodes per task during eval
eval_max_steps: 60

# ---- Checkpointing ----
checkpoint_interval: 5                # Save checkpoint every 5 iters (every ~15 min)
save_total_limit: 5                   # Max checkpoints on Hub

# ---- Metrics ----
push_interval: 10                     # Push metrics to Hub every N iterations

# ---- Output ----
output_dir: "/workspace/antiatropos_checkpoints"  # Base dir — run_id subfolder auto-created

# ---- Plotting ----
plot_interval: 10                     # Generate plots every 10 iters
plot_format: "png"                    # png or svg
plot_dpi: 150                         # Resolution

# ---- Hugging Face Hub ----
hub_model_repo: ""                    # e.g. "pranavkk/antiatropos-qlora-qwen3.5-4b"
hub_metrics_dataset: ""               # e.g. "pranavkk/antiatropos-training-metrics"
push_to_hub: true                     # Push adapter + metrics after training

# ---- Reproducibility ----
seed: 42
