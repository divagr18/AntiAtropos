# Grafana self-hosted on EKS
# Connects to the local Prometheus agent and imports AntiAtropos dashboards

replicaCount: 1

adminUser: admin
adminPassword: antiatropos

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 5Gi
  storageClassName: gp2

# Use the local Prometheus agent as data source
additionalDataSources:
  - name: AMP-Local
    type: prometheus
    access: proxy
    url: http://prometheus-agent-server.monitoring.svc.cluster.local:80
    isDefault: true
    editable: true

# Import AntiAtropos dashboards
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'AntiAtropos'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

dashboards:
  default:
    antiatropos-overview:
      gnetId: null
      datasource: AMP-Local
    antiatropos-live:
      gnetId: null
      datasource: AMP-Local

# Allow dashboard JSON files to be mounted
extraSecretMounts:
  - name: dashboards
    mountPath: /var/lib/grafana/dashboards
    subPath: ""
    secretName: antiatropos-grafana-dashboards
    readOnly: true

resources:
  limits:
    memory: 512Mi
    cpu: 250m
  requests:
    memory: 256Mi
    cpu: 100m

nodeSelector: {}
tolerations: []
affinity: {}
