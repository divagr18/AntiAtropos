apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: antiatropos
  region: us-east-1
  version: "1.30"
  tags:
    Project: AntiAtropos
    Environment: production

iam:
  withOIDC: true

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    wellKnownPolicies:
      ebsCSIController: true

managedNodeGroups:
  - name: linux-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    volumeSize: 50
    volumeType: gp3
    labels:
      role: worker
    tags:
      Project: AntiAtropos
      NodeGroup: linux-nodes
    iam:
      withAddonPolicies:
        ebs: true
        cloudWatch: true
        autoScaler: true

  # Optional: Spot instance group for cost savings
  # - name: spot-nodes
  #   instanceType: t3.medium
  #   desiredCapacity: 1
  #   minSize: 0
  #   maxSize: 3
  #   volumeSize: 30
  #   volumeType: gp3
  #   spot: true
  #   labels:
  #     role: spot-worker
  #   tags:
  #     Project: AntiAtropos

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
