[server]
http_addr = 127.0.0.1
http_port = 3000
domain = localhost
root_url = /grafana/
serve_from_sub_path = true
router_logging = false
enable_gzip = true

[auth]
disable_login_form = false

[auth.anonymous]
enabled = true
org_role = Viewer

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/json/antiatropos-overview.json

[security]
allow_embedding = true
